plugins {
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.1.0'
    id 'io.freefair.lombok' version '9.2.0'

}

java {
    toolchain {
        languageVersion.set(JavaLanguageVersion.of(26))
    }
}

repositories {
    mavenCentral()
}

dependencies{
    implementation 'org.xerial:sqlite-jdbc:3.51.1.0'
    implementation 'org.postgresql:postgresql:42.7.11'
    implementation 'com.h2database:h2:2.2.224'
    implementation 'org.yaml:snakeyaml:2.5'
    implementation 'ch.qos.logback:logback-classic:1.5.29'

    // Testing dependencies
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.1'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher:1.10.1'
    testImplementation 'org.mockito:mockito-core:5.8.0'
    testImplementation 'org.mockito:mockito-junit-jupiter:5.8.0'
    testImplementation 'org.assertj:assertj-core:3.27.7'
    testImplementation 'com.h2database:h2:2.2.224'
}

test {
    useJUnitPlatform()
}

application {
    mainClass.set('by.gsu.olaksen.MainApp')
    applicationDefaultJvmArgs = ['--enable-native-access=javafx.graphics','--enable-native-access=ALL-UNNAMED']
}

javafx {
    version = '26.0.1'
    modules = ['javafx.controls','javafx.fxml']
}

// Задача для загрузки тестовых данных в БД без установки sqlite3
tasks.register('loadTestData') {
    group = 'database'
    description = 'Загружает тестовые данные из insert_test_data.sql в sample.db'
    dependsOn configurations.runtimeClasspath

    doLast {
        def sqlFile = file('insert_test_data.sql')
        if (!sqlFile.exists()) {
            throw new GradleException("insert_test_data.sql not found in project root: ${projectDir}")
        }
        // Явно читаем в UTF-8 (важно на Windows)
        def sql = sqlFile.getText('UTF-8')
        println "[INFO] SQL file size: ${sql.length()} chars"

        def dbFile = file('sample.db').absolutePath
        println "[INFO] Using DB: ${dbFile}"

        def urls = configurations.runtimeClasspath.collect { it.toURI().toURL() } as URL[]
        def loader = new URLClassLoader(urls, ClassLoader.systemClassLoader)
        def driver = loader.loadClass('org.sqlite.JDBC').getDeclaredConstructor().newInstance() as java.sql.Driver
        def conn = driver.connect("jdbc:sqlite:${dbFile}", new Properties())
        conn.setAutoCommit(false)

        def stmt = conn.createStatement()
        // Создаём таблицы если их нет (аналог initDb в репозиториях)
        stmt.execute("""
            CREATE TABLE IF NOT EXISTS equipment (
                id INTEGER PRIMARY KEY AUTOINCREMENT,
                model VARCHAR(255) NOT NULL,
                available BOOLEAN NOT NULL,
                rent_until TEXT,
                type VARCHAR(50) NOT NULL,
                price_per_hour TEXT DEFAULT '0'
            )""")
        stmt.execute("""
            CREATE TABLE IF NOT EXISTS tabletops (
                id INTEGER PRIMARY KEY AUTOINCREMENT,
                inv_num INTEGER NOT NULL,
                name VARCHAR(255) NOT NULL
            )""")
        stmt.execute("""
            CREATE TABLE IF NOT EXISTS room_booking (
                id INTEGER PRIMARY KEY AUTOINCREMENT,
                room_number INTEGER NOT NULL,
                booking_date TEXT NOT NULL,
                hour VARCHAR(10) NOT NULL,
                status VARCHAR(20) NOT NULL
            )""")
        println "[INFO] Tables ready"
        int success = 0
        int failed = 0
        // Убираем комментарии и разбиваем по ;
        def cleaned = sql.replaceAll(/(?m)--[^\r\n]*/, '').replaceAll(/\r\n/, '\n')
        cleaned.split(';').each { chunk ->
            def trimmed = chunk.trim()
            if (trimmed && trimmed.toUpperCase().startsWith('INSERT')) {
                try {
                    stmt.execute(trimmed)
                    success++
                } catch (Exception e) {
                    failed++
                    println "[WARN] Failed: ${trimmed.take(80)} => ${e.message}"
                }
            }
        }
        conn.commit()
        // Проверяем сколько реально записей в таблицах
        def rs1 = stmt.executeQuery("SELECT COUNT(*) FROM equipment")
        def rs2 = stmt.executeQuery("SELECT COUNT(*) FROM tabletops")
        println "[CHECK] equipment rows: ${rs1.getInt(1)}, tabletops rows: ${rs2.getInt(1)}"
        rs1.close(); rs2.close()
        stmt.close()
        conn.close()
        println "[OK] Done: ${success} statements OK, ${failed} failed."
    }
}
