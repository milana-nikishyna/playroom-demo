plugins {
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.1.0'
    id 'io.freefair.lombok' version '9.2.0'

}

java {
    toolchain {
        languageVersion.set(JavaLanguageVersion.of(26))
    }
}

repositories {
    mavenCentral()
}

dependencies{
    implementation 'org.xerial:sqlite-jdbc:3.51.1.0'
    implementation 'org.postgresql:postgresql:42.7.11'
    implementation 'com.h2database:h2:2.2.224'
    implementation 'org.yaml:snakeyaml:2.5'
    implementation 'ch.qos.logback:logback-classic:1.5.29'

    // Testing dependencies
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.1'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher:1.10.1'
    testImplementation 'org.mockito:mockito-core:5.8.0'
    testImplementation 'org.mockito:mockito-junit-jupiter:5.8.0'
    testImplementation 'org.assertj:assertj-core:3.27.7'
    testImplementation 'com.h2database:h2:2.2.224'
}

test {
    useJUnitPlatform()
}

application {
    mainClass.set('by.gsu.olaksen.MainApp')
    applicationDefaultJvmArgs = ['--enable-native-access=javafx.graphics','--enable-native-access=ALL-UNNAMED']
}

javafx {
    version = '26.0.1'
    modules = ['javafx.controls','javafx.fxml']
}

// Задача для загрузки тестовых данных в БД без установки sqlite3
tasks.register('loadTestData') {
    group = 'database'
    description = 'Загружает тестовые данные из insert_test_data.sql в sample.db'
    dependsOn configurations.runtimeClasspath

    doLast {
        def sqlFile = file('insert_test_data.sql')
        if (!sqlFile.exists()) {
            throw new GradleException("Файл insert_test_data.sql не найден в корне проекта")
        }
        def sql = sqlFile.text

        // Загружаем JDBC-драйвер из classpath проекта напрямую (без DriverManager)
        def urls = configurations.runtimeClasspath.collect { it.toURI().toURL() } as URL[]
        def loader = new URLClassLoader(urls, ClassLoader.systemClassLoader)
        def driver = loader.loadClass('org.sqlite.JDBC').getDeclaredConstructor().newInstance() as java.sql.Driver
        def conn = driver.connect('jdbc:sqlite:sample.db', new Properties())

        def stmt = conn.createStatement()
        sql.split(';').each { line ->
            def trimmed = line.trim().replaceAll(/--[^\n]*/, '').trim()
            if (trimmed) {
                try {
                    stmt.execute(trimmed)
                } catch (Exception ignored) {
                }
            }
        }
        stmt.close()
        conn.close()
        println "✅ Тестовые данные успешно загружены в sample.db"
    }
}
